name: Deploy site to GitHub Pages

# Publishes from `main`:
#   /            product page (index.html)
#   /demo/       demo dashboard (source: dashboard/)
#   /dashboard/  -> redirects to /demo/
#
# See scripts/build-site.sh for the full publication layout.

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "dashboard/**"
      - "training/diagrams/exports/**"
      - "scripts/build-site.sh"
      - "scripts/check-links.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          chmod +x scripts/build-site.sh
          ./scripts/build-site.sh

      - name: Check for broken internal links
        run: python3 scripts/check-links.py _site

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
